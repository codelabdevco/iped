name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this PR focusing on:
            1. Bug detection and logic errors
            2. Security vulnerabilities (SQL injection, XSS, auth bypass)
            3. TypeScript best practices (no any type, proper typing)
            4. Next.js patterns (Server Components, API routes, middleware)
            5. MongoDB/Mongoose best practices
            6. Error handling completeness
            7. Input validation

            Comment in Thai language.
            Rate severity as: Critical, Warning, Suggestion
